name: Instagram News Sync

# ─────────────────────────────────────────────────────────────────────────────
# cron 設定ガイド（UTC 基準 / JST = UTC+9）
#
#  実行頻度    cron 式           UTC 実行時刻          JST 実行時刻
#  ─────────   ──────────────    ──────────────────    ──────────────────
#  1日2回      "0 1,13 * * *"    01:00 / 13:00         10:00 / 22:00
#  1日4回      "0 */6 * * *"     00/06/12/18:00        09/15/21/03:00  ← 採用
#  1日6回      "0 */4 * * *"     00/04/08/12/16/20:00  09/13/17/21/01/05:00
#
# 新規投稿がない場合は API 1回（ID確認のみ）で即終了するため、
# 頻繁に実行してもコスト増加はほぼありません。
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 */6 * * *"   # 1日4回: 9:00 / 15:00 / 21:00 / 3:00 JST
  workflow_dispatch:          # GitHub 画面から手動実行も可能

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Step 1: 最新 ID 確認 → 新規投稿があれば HTML 更新・状態保存 ──────────
      - name: Check for new posts and update HTML
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: python scripts/update_news.py

      # ── Step 2: 変更ファイルをステージング ────────────────────────────────────
      - name: Stage changes
        run: |
          git add index.html sitemap.xml scripts/last_post_id.json
          git add assets/instagram/ 2>/dev/null || true

      # ── Step 3: 差分があるときだけコミット・デプロイ ──────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: Instagram投稿をお知らせに反映 $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
          git push

      - name: Deploy to お名前.com via FTP
        if: steps.changes.outputs.changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftp
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.DS_Store
            **/CNAME
            **/scripts/**
